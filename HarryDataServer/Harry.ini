[General]
LogFilePath=D:\HarryDataServer\Logs\
LoggingActive=true
Language=English

[MySQL]
Server=localhost
Database=camera_data
User=SettData
Password=1234Set
RetentionPeriodDays=35

[CSV]
; Production CSV is written directly into a YYYY\MM\DD structure under CSV_BasePath (no NAS
; sorting needed). The MSA measurement CSV is NOT here — it goes into the per-run MSA result
; folder ([MSA] ResultPath, see below). CSVDiagnostic_Save enables the diagnostic dump; its
; output folder + rotation live in the [Diagnostic] section below. CSV_DiagnosticPath is kept
; as the fallback path when [Diagnostic] DiagnosticPath is empty.
CSV_BasePath=Y:\02_CSV_Merge
CSV_DiagnosticPath=Y:\03_CSV_Diagnostic
DataSetsPerFile=10000
CSV_Save=true
CSVMSA_Save=true
CSVDiagnostic_Save=true

[Diagnostic]
; Diagnostic telegrams (detected by the literal "Diagnostic" token, NOT the Mode_Diagnostic
; flag) are dumped raw — one row per telegram: ReceivedAt, Serial1(22), Serial2(32), then the
; "Diagnostic" word + label + all values, plain left-to-right (variable column count). Files are
; Diagnostic_<DDMMYY_HHMMSS>.csv directly in DiagnosticPath, a NEW file every MaxRows rows.
; If DiagnosticPath is empty the legacy [CSV] CSV_DiagnosticPath is reused (no duplication).
DiagnosticPath=Y:\03_CSV_Diagnostic
MaxRows=1000

[NAS]
; Keyence image filenames use the HYPHEN '-' as the field separator (the SZID contains an
; underscore after char 12, so '-' is the separator):
;   <Field1 32>-<Field2>-<overall 1|0>-<Controller>-<Nest>-&<ImageName>.png
;   Normal mode : Field1 = SZID (frame serial)             · Field2 = 32 zeros (ignored)
;   MSA mode    : Field1 = BaseID(14)+Loop(3)+zero padding · Field2 = DMC on the test part
; NG/Diagnostic/GoldenSample images and finished collages are moved by the NAS out of each
; \Input folder into sibling YYYY\MM\DD day-folders; cleanup deletes whole day-folders by age.
NAS_BasePath=Z:\Images
LowResIndividualPath=Z:\Images\01_Low_Resolution_Individual\Input
CollagePath=Z:\Images\02_Collage\Input
HighResNGPath=Z:\Images\03_High_Resolution_NG\Input
HighResDiagnosticPath=Z:\Images\04_High_Resolution_Diagnostic\Input
HighResGoldenSamplePath=Z:\Images\05_High_Resolution_GoldenSample\Input
; Default full-resolution image retention in days (SOW §5.2.3). The per-type keys
; below fall back to this value when omitted.
FullResRetentionDays=30
RetentionNGDays=30
RetentionDiagnosticDays=30
RetentionGoldenSampleDays=30
; Retention for finished collages, adjustable independently (falls back to FullResRetentionDays).
RetentionCollageDays=30
DeleteAfterCollage=false
; Part-exit image handling (runs for every part on channel 2):
;   DeletePictures=true  -> delete the source images
;   DeletePictures=false -> copy to BackupFolder\YYYY\MM\DD\HH\, verify size, then delete
; Defaults to backup mode so nothing is lost before on-site verification.
DeletePictures=false
BackupFolder=Z:\Images\06_Backup

[Collage]
; Collage.ini holds the layout; path is relative to this config folder (portable).
Collage_IniPath=Collage.ini
; Generate a collage per OK part. OFF until verified on-site (Phase 9 live test).
Collage_Generate=false
; Folder to search for the individual *.bmp images (matched by serial + KeyName).
Collage_SingleImages=Z:\Images\01_Low_Resolution_Individual\Input
; Output folder for the finished collage JPGs (serial_Collage.jpg).
Collage_ResultImages=Z:\Images\02_Collage\Input
; Maximum collage file size in KB (SOW §5.2.2). The composer re-encodes the JPEG at
; decreasing quality (85 → 30) until the output fits within this limit.
MaxFileSizeKB=128

[SPS]
IP=172.29.1.5
PortKeepAlive=6000
PortPartExit=6001
PortMSA_M10=6002
PortMSA_M11=6003
PortMSA_M20=6004
PortMSA_M21=6005
PortMSA_M50=6006
AutoConnect=true

[SQLSettings]
BatchSize=100
SaveIntervalSeconds=1

[Scanner]
; DMC handheld-scanner bridge. The scanner is a TCP client (fixed IP 172.29.1.100) that
; connects to this server and writes CR-terminated DMC codes.
; Port the scanner connects to. FIXED by the scanner hardware — do not change.
ScannerListenPort=9004
; Port the companion apps (HarryAnalysis, HarryLimitSample) connect to; every scan is
; rebroadcast (raw code, CR-terminated) to all connected companions.
CompanionPort=9000
; Host the companion apps dial for the rebroadcast (this server). Read by the companions.
CompanionHost=172.29.1.5
; Ring-buffer size for the Scanner tab (in-memory, cleared on restart).
MaxScanHistoryRows=100

[MSA]
; Reference (INPUT) files MSA_<module>.json — the expected pass/fail + xm definitions.
; Written by the HarryLimitSample tool, read here during a LimitSample/MSA run. Persistent;
; kept SEPARATE from ResultPath. Relative paths resolve against this config folder.
ReferencePath=MSA_References
; Result (OUTPUT) collection root. On run completion (SPS Request;<14-char BaseID>) the server
; gathers everything for the run under:
;   <ResultPath>\YYYY\MM\DD\<BaseID>\PDF\  (2 PDF reports: AllResults + FailuresOnly)
;                                   \CSV\  (the MSA measurement CSV)
;                                   \IMG\  (all run images, moved from the GoldenSample input)
; The date folder comes from the BaseID timestamp, not the current time.
ResultPath=Y:\01_MSA_Results

