[General]
LogFilePath=D:\HarryDataServer\Logs\
LoggingActive=true
Language=English

[MySQL]
Server=localhost
Database=camera_data
User=SettData
Password=1234Set
RetentionPeriodDays=35

[CSV]
CSV_BasePath=Y:\02_CSV_Merge
CSV_MSAPath=Y:\01_CSV_Evaluation
CSV_DiagnosticPath=Y:\03_CSV_Diagnostic
DataSetsPerFile=10000
CSV_Save=true
CSVMSA_Save=true
CSVDiagnostic_Save=true

[NAS]
NAS_BasePath=Z:\Images
LowResIndividualPath=Z:\Images\01_Low_Resolution_Individual\Input
CollagePath=Z:\Images\02_Collage\Input
HighResNGPath=Z:\Images\03_High_Resolution_NG\Input
HighResDiagnosticPath=Z:\Images\04_High_Resolution_Diagnostic\Input
HighResGoldenSamplePath=Z:\Images\05_High_Resolution_GoldenSample\Input
; Default full-resolution image retention in days (SOW §5.2.3). The per-type keys
; below fall back to this value when omitted.
FullResRetentionDays=30
RetentionNGDays=30
RetentionDiagnosticDays=30
RetentionGoldenSampleDays=30
DeleteAfterCollage=false
; Part-exit image handling (runs for every part on channel 2):
;   DeletePictures=true  -> delete the source images
;   DeletePictures=false -> copy to BackupFolder\YYYY\MM\DD\HH\, verify size, then delete
; Defaults to backup mode so nothing is lost before on-site verification.
DeletePictures=false
BackupFolder=Z:\Images\06_Backup

[Collage]
; Collage.ini holds the layout; path is relative to this config folder (portable).
Collage_IniPath=Collage.ini
; Generate a collage per OK part. OFF until verified on-site (Phase 9 live test).
Collage_Generate=false
; Folder to search for the individual *.bmp images (matched by serial + KeyName).
Collage_SingleImages=Z:\Images\01_Low_Resolution_Individual\Input
; Output folder for the finished collage JPGs (serial_Collage.jpg).
Collage_ResultImages=Z:\Images\02_Collage\Input
; Maximum collage file size in KB (SOW §5.2.2). The composer re-encodes the JPEG at
; decreasing quality (85 → 30) until the output fits within this limit.
MaxFileSizeKB=128

[SPS]
IP=172.29.1.5
PortKeepAlive=6000
PortPartExit=6001
PortMSA_M10=6002
PortMSA_M11=6003
PortMSA_M20=6004
PortMSA_M21=6005
PortMSA_M50=6006
AutoConnect=true

[SQLSettings]
BatchSize=100
SaveIntervalSeconds=1

[MSA]
; Folder with per-module reference files MSA_<module>.json (relative to this ini)
ReferencePath=MSA_References
; Folder for the generated MSA PDF reports (SOW §3.2.1). When empty, defaults to
; ReferencePath\Reports. Relative paths resolve against this config folder.
ReportPath=MSA_Reports

