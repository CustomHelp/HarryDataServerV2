; ==========================================================================
;  Harry.ini  --  CUSTOMER edition for the HarryDataServer companion tools
;
;  This is a STRIPPED config: it contains ONLY the read-only database
;  connection. There is NO write user (SettData) and NO production paths
;  (no F:, no X:/Y:/Z: mapped drives) — the analysis tools only read the
;  camera_data database.
;
;  Fill in the two values marked <...> below, then start any tool. You can
;  also change the connection later from inside each tool via
;  "Config-Pfad andern..." (top bar) or point it at another Harry.ini.
; ==========================================================================

[MySQL]
; Host or IP of the MySQL server that holds camera_data (reachable from this PC).
Server=<DB_HOST_OR_IP>
Database=camera_data
; Read-only account (see readonly_user.sql). Change the password to the one your admin set.
GetUser=GetData
GetPassword=<READONLY_PASSWORD>
